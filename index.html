<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cary Greenwood - AI Engineer, Builder, Maker">
  <title>Cary Greenwood</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0a0a0f;
      --text: #e0e0e0;
      --accent: #4af;
      --dim: #555;
    }
    
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    /* Starfield */
    .stars {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    
    /* Main content */
    .container {
      text-align: center;
      z-index: 1;
      padding: 2rem;
    }
    
    .earth-container {
      width: 300px;
      height: 300px;
      margin: 0 auto 2rem;
    }
    .earth-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .name {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    
    .title {
      color: var(--dim);
      font-size: 1rem;
      letter-spacing: 0.2em;
      margin-bottom: 2rem;
    }
    
    .terminal {
      background: rgba(20, 20, 30, 0.8);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1.5rem 2rem;
      text-align: left;
      max-width: 500px;
      margin: 0 auto 2rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    
    .terminal-header {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #333;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-red { background: #ff5f56; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green { background: #27ca40; }
    
    .prompt { color: var(--accent); }
    .command { color: var(--text); }
    .output { color: var(--dim); margin: 0.5rem 0; }
    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.2em;
      background: var(--accent);
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    
    .links {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      color: var(--dim);
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      transition: color 0.3s, transform 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .links a:hover {
      color: var(--accent);
      transform: translateY(-2px);
    }
    
    /* Responsive */
    @media (max-width: 600px) {
      .name { font-size: 1.8rem; }
      .earth-container { width: 200px; height: 200px; }
      .terminal { padding: 1rem; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  
  <div class="container">
    <div class="earth-container">
      <img src="https://raw.githubusercontent.com/carygeo/carygeo/main/earth.gif" alt="Earth">
    </div>
    
    <h1 class="name">Cary Greenwood</h1>
    <p class="title">AI Engineer · Builder · Maker</p>
    
    <div class="terminal">
      <div class="terminal-header">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
      </div>
      <div id="terminal-content">
        <span class="prompt">$</span> <span class="command" id="typed"></span><span class="cursor"></span>
      </div>
    </div>
    
    <div class="links">
      <a href="https://github.com/carygeo" target="_blank">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHub
      </a>
      <a href="https://linkedin.com/in/carygreenwood" target="_blank">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        LinkedIn
      </a>
    </div>
  </div>

  <script>
    // Generate stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 150; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
      star.style.animationDelay = Math.random() * 3 + 's';
      starsEl.appendChild(star);
    }
    
    // Typewriter effect
    const commands = [
      { cmd: 'whoami', out: 'AI Engineer @ Suffolk Construction' },
      { cmd: 'cat interests.txt', out: 'LLMs · RAG · Agentic AI · Tropical Farming' },
      { cmd: 'ls projects/', out: 'mission-control/  fruit-trees/  claude-tools/' },
    ];
    
    const typedEl = document.getElementById('typed');
    const terminalContent = document.getElementById('terminal-content');
    let cmdIndex = 0;
    let charIndex = 0;
    let isTyping = true;
    let currentOutput = null;
    
    function type() {
      if (cmdIndex >= commands.length) {
        cmdIndex = 0;
        // Clear old outputs after full cycle
        const outputs = terminalContent.querySelectorAll('.output, .old-line');
        if (outputs.length > 6) {
          outputs[0].remove();
          outputs[1].remove();
        }
      }
      
      const current = commands[cmdIndex];
      
      if (isTyping) {
        if (charIndex < current.cmd.length) {
          typedEl.textContent += current.cmd[charIndex];
          charIndex++;
          setTimeout(type, 50 + Math.random() * 50);
        } else {
          isTyping = false;
          setTimeout(type, 500);
        }
      } else {
        // Show output
        const oldLine = document.createElement('div');
        oldLine.className = 'old-line';
        oldLine.innerHTML = `<span class="prompt">$</span> <span class="command">${current.cmd}</span>`;
        terminalContent.insertBefore(oldLine, terminalContent.lastElementChild);
        
        const output = document.createElement('div');
        output.className = 'output';
        output.textContent = current.out;
        terminalContent.insertBefore(output, terminalContent.lastElementChild);
        
        typedEl.textContent = '';
        charIndex = 0;
        cmdIndex++;
        isTyping = true;
        setTimeout(type, 1500);
      }
    }
    
    setTimeout(type, 1000);
  </script>
</body>
</html>
